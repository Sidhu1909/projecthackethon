<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Authentication — TalentBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070810;
      --surface:   #0e1020;
      --border:    rgba(120,180,255,0.12);
      --blue:      #5b9cf6;
      --blue-glow: rgba(91,156,246,0.3);
      --cyan:      #38d9f5;
      --green:     #3ddc97;
      --green-glow:rgba(61,220,151,0.3);
      --red:       #f25c5c;
      --red-glow:  rgba(242,92,92,0.3);
      --amber:     #f0b429;
      --white:     #e8edf7;
      --muted:     #6b7a99;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-serif:'DM Serif Display', serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    :focus-visible { outline: 2px solid var(--blue); outline-offset: 4px; }

    #aria-live {
      position: absolute; width: 1px; height: 1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,156,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,156,246,0.03) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }

    body::after {
      content: ''; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,156,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    #app {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 2.8rem 2.8rem;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 80px rgba(0,0,0,0.6);
    }

    .card::before, .card::after {
      content: ''; position: absolute;
      width: 18px; height: 18px;
      border-color: var(--blue); border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-header {
      text-align: center; margin-bottom: 2.5rem;
      opacity: 0; animation: fadeIn 0.8s ease forwards 0.2s;
    }

    .logo-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border: 1px solid var(--border); border-radius: 50%;
      margin-bottom: 1.2rem; position: relative;
    }
    .logo-mark svg { width: 24px; height: 24px; stroke: var(--blue); fill: none; stroke-width: 1.5; }
    .logo-mark::before {
      content: ''; position: absolute; inset: -6px;
      border-radius: 50%; border: 1px solid rgba(91,156,246,0.15);
    }

    .card-title {
      font-family: var(--font-serif); font-size: 1.9rem; font-weight: 400;
      color: var(--white); letter-spacing: 0.02em; line-height: 1.2; margin-bottom: 0.5rem;
    }
    .card-subtitle { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }

    .intent-chips {
      display: flex; gap: 0.8rem; justify-content: center;
      margin-bottom: 1.5rem;
      opacity: 0; transition: opacity 0.4s;
    }
    .intent-chips.visible { opacity: 1; }
    .chip {
      border: 1px solid var(--border); border-radius: 99px;
      padding: 0.45rem 1.1rem; font-size: 0.6rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; background: none;
      font-family: var(--font-mono); transition: all 0.25s;
    }
    .chip:hover, .chip.active { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px var(--blue-glow); }
    .chip.signup-active { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(56,217,245,0.25); }

    .steps {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 2.5rem;
      opacity: 0; animation: fadeIn 0.8s ease forwards 0.5s;
    }

    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: var(--muted);
      transition: all 0.4s ease; flex-shrink: 0;
    }
    .step-dot.active { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
    .step-dot.done   { border-color: var(--green); background: rgba(61,220,151,0.1); color: var(--green); }

    .step-line { flex: 1; height: 1px; background: var(--border); max-width: 80px; transition: background 0.4s; }
    .step-line.done { background: var(--green); }

    .step-label {
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-align: center; margin-bottom: 2rem; min-height: 1em; transition: color 0.3s;
    }

    .viz-wrap {
      display: flex; align-items: center; justify-content: center;
      height: 64px; gap: 3px; margin-bottom: 1.8rem;
    }

    .bar {
      width: 3px; border-radius: 2px; background: var(--blue);
      opacity: 0.25; height: 8px; transition: background 0.3s;
    }
    .bar.active {
      opacity: 1;
      animation: wave var(--dur, 0.8s) ease-in-out infinite alternate;
      animation-delay: var(--del, 0s);
    }
    .bar.success { background: var(--green); }
    .bar.error   { background: var(--red); }
    .bar.cyan    { background: var(--cyan); }

    @keyframes wave { from { height: 6px; } to { height: var(--h, 40px); } }

    .prompt-box {
      text-align: center; margin-bottom: 1.5rem; min-height: 4.5rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .prompt-text {
      font-family: var(--font-serif); font-size: 1.25rem; font-style: italic;
      color: var(--white); line-height: 1.4; transition: opacity 0.3s;
    }
    .transcript-text {
      font-size: 0.7rem; letter-spacing: 0.08em; color: var(--cyan);
      min-height: 1.2em; transition: opacity 0.3s; font-style: normal;
    }

    .confidence-bar {
      width: 100%; height: 2px; background: rgba(91,156,246,0.1);
      border-radius: 2px; margin-bottom: 1rem; overflow: hidden;
    }
    .confidence-fill {
      height: 100%; background: var(--blue); border-radius: 2px;
      width: 0%; transition: width 0.3s ease, background 0.3s;
    }
    .confidence-fill.high  { background: var(--green); }
    .confidence-fill.med   { background: var(--amber); }
    .confidence-fill.low   { background: var(--red); }

    .state-pill {
      display: inline-flex; align-items: center; gap: 0.45rem;
      border: 1px solid var(--border); border-radius: 99px;
      padding: 0.35rem 0.9rem; font-size: 0.58rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 2rem; transition: all 0.3s;
    }
    .state-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .state-pill.listening { border-color: rgba(91,156,246,0.4); color: var(--blue); }
    .state-pill.listening .dot { background: var(--blue); box-shadow: 0 0 6px var(--blue); animation: blink 1s ease infinite; }
    .state-pill.speaking  { border-color: rgba(240,180,41,0.4); color: var(--amber); }
    .state-pill.speaking .dot  { background: var(--amber); box-shadow: 0 0 6px rgba(240,180,41,0.5); animation: blink 0.6s ease infinite; }
    .state-pill.success   { border-color: rgba(61,220,151,0.4); color: var(--green); }
    .state-pill.success .dot   { background: var(--green); }
    .state-pill.error     { border-color: rgba(242,92,92,0.4); color: var(--red); }
    .state-pill.error .dot     { background: var(--red); }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .mic-btn {
      display: block; width: 72px; height: 72px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg); cursor: pointer;
      margin: 0 auto 1.5rem; position: relative; transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn svg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 28px; height: 28px; stroke: var(--muted); fill: none;
      stroke-width: 1.5; stroke-linecap: round; transition: stroke 0.3s;
    }
    .mic-btn:hover, .mic-btn:focus-visible { border-color: var(--blue); box-shadow: 0 0 20px var(--blue-glow); }
    .mic-btn:hover svg, .mic-btn:focus-visible svg { stroke: var(--blue); }
    .mic-btn.listening { border-color: var(--blue); box-shadow: 0 0 30px var(--blue-glow), 0 0 60px rgba(91,156,246,0.1); animation: breathe 1.4s ease-in-out infinite; }
    .mic-btn.listening svg { stroke: var(--blue); }

    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    .hint { text-align: center; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

    .action-btns {
      display: flex; gap: 0.8rem; justify-content: center;
      margin-bottom: 1rem;
    }
    .action-btn {
      border: 1px solid var(--border); border-radius: 3px;
      padding: 0.55rem 1.4rem; font-size: 0.6rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; background: none;
      font-family: var(--font-mono); transition: all 0.25s;
    }
    .action-btn:hover { border-color: var(--blue); color: var(--blue); }
    .action-btn.primary { border-color: rgba(91,156,246,0.4); color: var(--blue); }

    #result-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 1.2rem; min-height: 280px;
    }
    #result-screen.show { display: flex; animation: fadeIn 0.7s ease forwards; }

    .result-icon {
      width: 72px; height: 72px; border-radius: 50%; border: 1px solid;
      display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem;
    }
    .result-icon.success { border-color: var(--green); box-shadow: 0 0 30px var(--green-glow); animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .result-icon.error   { border-color: var(--red);   box-shadow: 0 0 30px var(--red-glow);   animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .result-icon svg { width: 32px; height: 32px; stroke-width: 2; stroke-linecap: round; }
    .result-icon.success svg { stroke: var(--green); fill: none; }
    .result-icon.error   svg { stroke: var(--red);   fill: none; }

    @keyframes resultPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .result-title { font-family: var(--font-serif); font-size: 2rem; }
    .result-title.success { color: var(--green); }
    .result-title.error   { color: var(--red); }
    .result-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    .retry-btn {
      margin-top: 0.8rem; background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font-mono); font-size: 0.6rem;
      letter-spacing: 0.25em; text-transform: uppercase;
      padding: 0.55rem 1.4rem; cursor: pointer; border-radius: 2px; transition: all 0.2s;
    }
    .retry-btn:hover, .retry-btn:focus-visible { border-color: var(--blue); color: var(--blue); }

    .redirect-note {
      font-size: 0.6rem; letter-spacing: 0.2em; color: var(--muted);
      margin-top: 0.5rem; text-align: center;
    }

    .demo-note {
      margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.2rem;
      font-size: 0.58rem; color: var(--muted); letter-spacing: 0.12em; text-align: center;
      line-height: 1.9; opacity: 0; animation: fadeIn 0.8s ease forwards 1s;
    }
    .demo-note strong { color: var(--blue); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .kbd { display: inline-block; border: 1px solid var(--border); border-radius: 3px; padding: 0.1em 0.4em; font-size: 0.55rem; color: var(--muted); vertical-align: middle; }
  </style>
</head>
<body>

<div id="aria-live" aria-live="assertive" aria-atomic="true" role="status"></div>

<div id="app">
  <div class="card" role="main" aria-label="Voice Authentication">

    <div class="card-header">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><path d="M3 11a9 9 0 0 0 18 0"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <h1 class="card-title" id="card-title">Welcome</h1>
      <p class="card-subtitle" id="card-subtitle">Voice authentication</p>
    </div>

    <div class="intent-chips visible" id="intent-chips" aria-label="Choose authentication mode">
      <button class="chip" id="chip-signin" onclick="forceMode('signin')">Sign In</button>
      <button class="chip" id="chip-signup" onclick="forceMode('signup')">Sign Up</button>
    </div>

    <div class="steps" id="steps-bar" aria-label="Authentication progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="2">
      <div class="step-dot active" id="step1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="step2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="step3">✓</div>
    </div>

    <div id="auth-section">
      <div class="step-label" id="step-label">CLICK A BUTTON ABOVE OR SPEAK</div>

      <div class="viz-wrap" aria-hidden="true" id="viz"></div>

      <div class="prompt-box">
        <div class="prompt-text" id="prompt-text">Initialising…</div>
        <div class="transcript-text" id="transcript-text"></div>
      </div>

      <div class="confidence-bar" id="confidence-bar" style="display:none;">
        <div class="confidence-fill" id="confidence-fill"></div>
      </div>

      <div style="text-align:center; margin-bottom:1.5rem;">
        <div class="state-pill" id="state-pill">
          <span class="dot"></span>
          <span id="state-label">READY</span>
        </div>
      </div>

      <button class="mic-btn" id="mic-btn" aria-label="Tap to speak" onclick="handleMicClick()" tabindex="0">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
      </button>

      <p class="hint">Press <span class="kbd">Space</span> or tap the mic · Or click the buttons above</p>
    </div>

    <div id="result-screen" role="alert" aria-live="assertive"></div>

    <div class="demo-note" id="demo-note">
      Say <strong>"sign in"</strong> or <strong>"sign up"</strong> — or click the buttons above
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const CANDIDATE_INTERVIEW_URL = "./candidate-interview.html";

const SILENCE_MS       = 1400;   // ms of silence after last word before accepting
const MIN_CONFIDENCE   = 0.0;    // 0 = accept all; raise to filter mumbles
const MAX_ALTERNATIVES = 3;      // engine returns up to N guesses; best wins
const RESTART_DELAY_MS = 150;

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */

/*
 * FIX 1 — normalize() no longer strips digits.
 * Original: .replace(/[^a-z0-9\s]/g, '')  ← kept digits but also stripped
 *           them when called on intent strings — fine.
 * Real problem was spokenToEmail stripping spaces which ate digit groups.
 * Safe to keep digits in normalize for intent detection.
 */
function normalize(str) {
  return str.toLowerCase()
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

/*
 * FIX 2 — spokenToEmail: convert digit words AND preserve numeral runs.
 * e.g. "john 123 at gmail dot com" → "john123@gmail.com"
 *      "alice dot smith 42 at outlook dot com" → "alice.smith42@outlook.com"
 */
const DIGIT_WORDS = {
  zero:0, one:1, two:2, three:3, four:4, five:5,
  six:6, seven:7, eight:8, nine:9,
  // common spoken variants
  won:1, to:2, too:2, for:4, ate:8
};

function wordsToDigits(str) {
  // Replace spoken digit words with their numeral, e.g. "one two three" → "123"
  return str.replace(/\b(zero|one|won|two|to|too|three|four|for|five|six|seven|eight|ate|nine)\b/gi, m => {
    return DIGIT_WORDS[m.toLowerCase()] ?? m;
  });
}

function spokenToEmail(spoken) {
  let s = spoken.toLowerCase();

  // spoken separators
  s = s.replace(/\s+at\s+the\s+rate\s+(of\s+)?/g, '@');
  s = s.replace(/\s+at\s+/g,   '@');
  s = s.replace(/\bat\b/g,     '@');
  s = s.replace(/\s+dot\s+/g,  '.');
  s = s.replace(/\bdot\b/g,    '.');
  s = s.replace(/\s+dash\s+/g, '-');
  s = s.replace(/\bdash\b/g,   '-');
  s = s.replace(/\s+underscore\s+/g, '_');
  s = s.replace(/\bunderscore\b/g,   '_');

  // convert digit words → numerals BEFORE stripping spaces
  s = wordsToDigits(s);

  // collapse all remaining spaces (joins adjacent words/digits)
  s = s.replace(/\s+/g, '').trim();

  return s;
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let currentMode           = null;
let state                 = 'idle';
let authStep              = 'intent';
let spokenEmail           = '';
let spokenPassword        = '';
let spokenPasswordConfirm = '';
let recognition           = null;
let isSpeaking            = false;
let isListening           = false;
let _redirecting          = false;

/* ════════════════════════════════════════
   WAVEFORM
════════════════════════════════════════ */
const viz = document.getElementById('viz');
const BAR_COUNT = 28;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const maxH = 12 + Math.sin(i / BAR_COUNT * Math.PI) * 32;
  b.style.setProperty('--h',   maxH + 'px');
  b.style.setProperty('--dur', (0.5 + Math.random() * 0.7).toFixed(2) + 's');
  b.style.setProperty('--del', (i / BAR_COUNT * 0.5).toFixed(2) + 's');
  viz.appendChild(b);
}

function setBars(mode) {
  viz.querySelectorAll('.bar').forEach(b => {
    b.className = 'bar';
    if (mode === 'listening' || mode === 'speaking') b.classList.add('active');
    else if (mode === 'success') b.classList.add('active', 'success');
    else if (mode === 'error')   b.classList.add('active', 'error');
  });
}

/* ════════════════════════════════════════
   CONFIDENCE BAR UI
════════════════════════════════════════ */
function setConfidence(pct) {
  const bar  = document.getElementById('confidence-bar');
  const fill = document.getElementById('confidence-fill');
  if (pct === null) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  fill.style.width  = Math.round(pct * 100) + '%';
  fill.className = 'confidence-fill' + (pct >= 0.7 ? ' high' : pct >= 0.4 ? ' med' : ' low');
}

/* ════════════════════════════════════════
   ARIA LIVE
════════════════════════════════════════ */
function announce(msg) {
  const el = document.getElementById('aria-live');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = msg; });
}

/* ════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════ */
function setPrompt(text)     { document.getElementById('prompt-text').textContent = text; }
function setTranscript(text) {
  const disp = text.replace(/\s+at\s+/gi, '@').replace(/\s+dot\s+/gi, '.');
  document.getElementById('transcript-text').textContent = disp;
}
function setPill(mode, label) {
  const pill = document.getElementById('state-pill');
  const lbl  = document.getElementById('state-label');
  pill.className = 'state-pill ' + (mode || '');
  lbl.textContent = label;
}
function setMicListening(active) {
  isListening = active;
  const btn = document.getElementById('mic-btn');
  btn.className = 'mic-btn' + (active ? ' listening' : '');
  btn.setAttribute('aria-label', active ? 'Listening… speak now' : 'Tap to speak');
}

function updateSteps(step) {
  const s1  = document.getElementById('step1');
  const s2  = document.getElementById('step2');
  const s3  = document.getElementById('step3');
  const l1  = document.getElementById('line1');
  const l2  = document.getElementById('line2');
  const lbl = document.getElementById('step-label');

  s1.className = 'step-dot' + (step > 1 ? ' done' : step === 1 ? ' active' : '');
  s2.className = 'step-dot' + (step > 2 ? ' done' : step === 2 ? ' active' : '');
  s3.className = 'step-dot' + (step >= 3 ? ' active' : '');
  l1.className = 'step-line' + (step > 1 ? ' done' : '');
  l2.className = 'step-line' + (step > 2 ? ' done' : '');

  if (!currentMode) {
    lbl.textContent = 'CLICK ABOVE OR SAY "SIGN IN" / "SIGN UP"';
    return;
  }
  const mode = currentMode;
  if (mode === 'signin') {
    const labels = ['', 'STEP 1 OF 2 — EMAIL', 'STEP 2 OF 2 — PASSWORD', 'VERIFYING…'];
    lbl.textContent = labels[step] || '';
  } else {
    const labels = ['', 'STEP 1 OF 3 — EMAIL', 'STEP 2 OF 3 — PASSWORD', 'STEP 3 OF 3 — CONFIRM PASSWORD'];
    lbl.textContent = labels[step] || '';
  }
}

function highlightChip(mode) {
  document.getElementById('chip-signin').classList.toggle('active',        mode === 'signin');
  document.getElementById('chip-signup').classList.toggle('signup-active', mode === 'signup');
}

function applyModeHeader(mode) {
  if (mode === 'signin') {
    document.getElementById('card-title').textContent    = 'Voice Sign In';
    document.getElementById('card-subtitle').textContent = 'Speak to authenticate';
    document.getElementById('demo-note').innerHTML = 'Speak your email address, then your password.';
  } else {
    document.getElementById('card-title').textContent    = 'Voice Sign Up';
    document.getElementById('card-subtitle').textContent = 'Create your account';
    document.getElementById('demo-note').innerHTML = 'Speak your email, a password, then confirm the password.';
  }
}

/* ════════════════════════════════════════
   ABORT HELPERS
════════════════════════════════════════ */
function abortRecognition() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  setMicListening(false);
}

function cancelSpeech() {
  if (window.speechSynthesis) { try { speechSynthesis.cancel(); } catch(e) {} }
  isSpeaking = false;
}

/* ════════════════════════════════════════
   SPEECH SYNTHESIS
════════════════════════════════════════ */
function speak(text, onEnd) {
  cancelSpeech();
  if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }

  isSpeaking = true;
  setPill('speaking', 'SPEAKING');
  setBars('speaking');

  const go = () => {
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 0.92; utt.pitch = 1.0; utt.volume = 1;

    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => /Samantha|Karen|Daniel|Google UK|Google US|Alex/i.test(v.name))
                   || voices.find(v => v.lang && v.lang.startsWith('en'));
    if (preferred) utt.voice = preferred;

    const wordCount = text.trim().split(/\s+/).length;
    const ms = Math.max(8000, wordCount * 600 + 3000);
    const timer = setTimeout(() => { isSpeaking = false; if (onEnd) onEnd(); }, ms);

    const done = () => {
      clearTimeout(timer);
      isSpeaking = false;
      setPill('', 'READY');
      setBars('idle');
      if (onEnd) onEnd();
    };
    utt.onend   = done;
    utt.onerror = done;

    announce(text);
    speechSynthesis.speak(utt);
  };

  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) {
    speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; go(); };
  } else {
    go();
  }
}

/* ════════════════════════════════════════
   SPEECH RECOGNITION
   ─────────────────────────────────────
   APPROACH: continuous:true + recognition.stop() on silence.
   
   Key insight: NEVER call recognition.abort() or restart the session
   mid-capture. Instead:
   1. Start ONE continuous session per listen() call.
   2. Collect interim + final results into a single accumulated string.
   3. After SILENCE_MS of no new speech, call recognition.stop() — this
      flushes remaining audio and fires onend cleanly.
   4. In onend, deliver the result. No restart loop → no duplicates.
   
   Dedup: we track the last resultIndex we processed so re-delivered
   events (Chrome sometimes re-fires e.resultIndex=0) are skipped.
════════════════════════════════════════ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function listen(onResult, onError) {
  if (!SR) {
    onError('Speech recognition is not supported in this browser. Please use Chrome.');
    return;
  }

  abortRecognition();

  let collectedText  = '';   // all final segments joined
  let collectedConf  = 0;
  let interimText    = '';
  let done           = false;
  let silenceTimer   = null;
  let lastResultIdx  = -1;   // dedup: skip already-processed result indices
  let stopping       = false;// true once we've called .stop()

  function cleanup() {
    clearTimeout(silenceTimer);
    setMicListening(false);
    setBars('idle');
    setConfidence(null);
  }

  function stopListening() {
    if (stopping || done) return;
    stopping = true;
    clearTimeout(silenceTimer);
    try { recognition.stop(); } catch(e) {}
    // onend will fire and call deliver()
  }

  function deliver() {
    if (done) return;
    done = true;
    cleanup();
    recognition = null;

    // Use final text; fall back to last interim if engine never finalized
    const text = (collectedText || interimText).trim();

    if (!text) {
      // Nothing at all — restart fresh
      done     = false;
      stopping = false;
      lastResultIdx = -1;
      collectedText = '';
      interimText   = '';
      startRec();
      return;
    }

    setConfidence(collectedConf || null);
    onResult(text, collectedConf);
  }

  function resetSilenceTimer() {
    clearTimeout(silenceTimer);
    if (collectedText || interimText.trim()) {
      silenceTimer = setTimeout(stopListening, SILENCE_MS);
    }
  }

  function startRec() {
    if (done) return;

    recognition = new SR();
    recognition.lang            = 'en-US';
    recognition.interimResults  = true;
    recognition.maxAlternatives = MAX_ALTERNATIVES;
    recognition.continuous      = true;   // stay open; we call .stop() ourselves

    setPill('listening', 'LISTENING');
    setMicListening(true);
    setBars('listening');
    setConfidence(null);

    recognition.onresult = (e) => {
      if (done || stopping) return;

      for (let i = e.resultIndex; i < e.results.length; i++) {
        // Skip if we already processed this index (Chrome duplicate guard)
        if (i <= lastResultIdx) continue;

        const result = e.results[i];

        if (result.isFinal) {
          lastResultIdx = i;
          // Pick highest-confidence alternative
          let best = result[0];
          for (let j = 1; j < result.length; j++) {
            if ((result[j].confidence || 0) > (best.confidence || 0)) best = result[j];
          }
          const seg = best.transcript.trim();
          // Append only if not a duplicate of what we already have
          if (seg && !collectedText.endsWith(seg)) {
            collectedText = (collectedText + ' ' + seg).trim();
          }
          collectedConf = best.confidence || 0;
          interimText   = '';   // clear interim once finalized
          setConfidence(collectedConf);
        } else {
          // Show live interim (don't update lastResultIdx — it's not final)
          let best = result[0];
          for (let j = 1; j < result.length; j++) {
            if ((result[j].confidence || 0) > (best.confidence || 0)) best = result[j];
          }
          interimText = best.transcript;
        }
      }

      const display = (collectedText + (interimText ? ' ' + interimText : '')).trim();
      if (display) setTranscript('"' + display + '"');

      resetSilenceTimer();
    };

    recognition.onend = () => {
      // Always deliver when the session ends (whether we called stop() or browser ended it)
      deliver();
    };

    recognition.onerror = (e) => {
      if (done) return;
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        done = true;
        cleanup();
        recognition = null;
        onError('Microphone access denied. Please allow microphone access and try again.');
        return;
      }
      // For no-speech / network / aborted: onend will fire next, which calls deliver()
      // If we have something, it'll be returned. If not, deliver() restarts.
    };

    try {
      recognition.start();
    } catch(ex) {
      // Already started or other issue — short delay then retry
      setTimeout(() => { if (!done) startRec(); }, 300);
    }
  }

  startRec();
}

/* ════════════════════════════════════════
   INTENT CAPTURE
════════════════════════════════════════ */
function captureIntentMode() {
  currentMode = null;
  authStep    = 'intent';
  state       = 'idle';
  setTranscript('');
  setConfidence(null);
  updateSteps(0);
  highlightChip(null);

  document.getElementById('card-title').textContent    = 'Welcome to TalentBridge';
  document.getElementById('card-subtitle').textContent = 'How would you like to continue?';
  document.getElementById('demo-note').innerHTML =
    'Say <strong>"sign in"</strong> or <strong>"sign up"</strong> — or click the buttons above';

  setPrompt('Sign in or sign up?');

  speak("Welcome to TalentBridge. Would you like to sign in or sign up? You can also click the buttons.", () => {
    setPill('', 'READY');
    setBars('idle');
    listenForIntent();
  });
}

function listenForIntent() {
  state = 'listening';
  setPrompt('Listening… say sign in or sign up');

  listen((result) => {
    state = 'processing';
    const spoken = normalize(result);
    setTranscript('"' + result + '"');
    setBars('idle');

    const wantsSignIn  = /sign\s*in|log\s*in|signin|login/.test(spoken);
    const wantsSignUp  = /sign\s*up|register|create|signup|new\s*account/.test(spoken);

    if (wantsSignIn && !wantsSignUp) {
      highlightChip('signin');
      speak("Got it — signing you in.", () => {
        currentMode = 'signin';
        applyModeHeader('signin');
        startSignInFlow();
      });
    } else if (wantsSignUp) {
      highlightChip('signup');
      speak("Got it — let's create your account.", () => {
        currentMode = 'signup';
        applyModeHeader('signup');
        startSignUpFlow();
      });
    } else {
      setPrompt('Please say "sign in" or "sign up"');
      setPill('', 'TRY AGAIN');
      setTranscript('');
      speak("Sorry, I didn't catch that. Please say sign in or sign up.", () => {
        listenForIntent();
      });
    }
  }, (err) => {
    state = 'idle';
    setBars('idle');
    setPill('error', 'MIC ERROR');
    setPrompt(err);
    announce(err);
  });
}

/* ════════════════════════════════════════
   SIGN IN FLOW
════════════════════════════════════════ */
function startSignInFlow() {
  authStep       = 'email';
  spokenEmail    = '';
  spokenPassword = '';
  updateSteps(1);
  setTranscript('');

  speak("Please say your email address.", () => {
    setPrompt("Say your email address.");
    announce("Listening for email.");
    captureEmailSignIn();
  });
}

function captureEmailSignIn() {
  authStep = 'email';
  state    = 'listening';
  setPrompt("Listening for your email…");

  listen((result) => {
    state       = 'processing';
    spokenEmail = result.trim();
    setTranscript('"' + spokenToEmail(spokenEmail) + '"');
    authStep = 'password';
    updateSteps(2);

    speak('Got it. Now please say your password.', () => {
      setPrompt("Say your password.");
      setTranscript('');
      capturePasswordSignIn();
    });
  }, handleListenError);
}

function capturePasswordSignIn() {
  authStep = 'password';
  state    = 'listening';
  setPrompt("Listening for your password…");

  listen((result) => {
    state          = 'verifying';
    spokenPassword = result.trim();
    setTranscript('••••••••');
    updateSteps(3);
    setPill('', 'VERIFYING');
    verifySignIn();
  }, handleListenError);
}

async function verifySignIn() {
  if (window.attemptFirebaseSignIn) {
    try {
      const res = await window.attemptFirebaseSignIn(spokenEmail, spokenPassword);
      handleAuthResult(res);
    } catch(e) {
      handleAuthResult({ success: false, error: 'Sign-in error. Please try again.' });
    }
  } else {
    handleAuthResult({ success: true, error: null });
  }
}

/* ════════════════════════════════════════
   SIGN UP FLOW
════════════════════════════════════════ */
function startSignUpFlow() {
  authStep              = 'email';
  spokenEmail           = '';
  spokenPassword        = '';
  spokenPasswordConfirm = '';
  updateSteps(1);
  setTranscript('');

  speak("Let's create your account. Please say your email address.", () => {
    setPrompt("Say your email address.");
    captureEmailSignUp();
  });
}

function captureEmailSignUp() {
  authStep = 'email';
  state    = 'listening';
  setPrompt("Listening for your email…");

  listen((result) => {
    state       = 'processing';
    spokenEmail = result.trim();
    setTranscript('"' + spokenToEmail(spokenEmail) + '"');
    authStep = 'password';
    updateSteps(2);

    speak('Got it. Now please say your password.', () => {
      setPrompt("Say your password.");
      setTranscript('');
      capturePasswordSignUp();
    });
  }, handleListenError);
}

function capturePasswordSignUp() {
  authStep = 'password';
  state    = 'listening';
  setPrompt("Listening for your password…");

  listen((result) => {
    state          = 'processing';
    spokenPassword = result.trim();
    setTranscript('••••••••');
    authStep = 'password-confirm';
    updateSteps(3);

    speak('Got it. Now please confirm your password.', () => {
      setPrompt("Confirm your password.");
      setTranscript('');
      captureConfirmSignUp();
    });
  }, handleListenError);
}

function captureConfirmSignUp() {
  authStep = 'password-confirm';
  state    = 'listening';
  setPrompt("Listening for password confirmation…");

  listen((result) => {
    state                 = 'verifying';
    spokenPasswordConfirm = result.trim();
    setTranscript('••••••••');
    setPill('', 'VERIFYING');
    verifySignUp();
  }, handleListenError);
}

async function verifySignUp() {
  const pwd1 = normalize(spokenPassword);
  const pwd2 = normalize(spokenPasswordConfirm);

  if (pwd1 !== pwd2) {
    handleAuthResult({ success: false, error: 'Passwords do not match. Please try again.' });
    return;
  }
  if (window.attemptFirebaseSignUp) {
    try {
      const res = await window.attemptFirebaseSignUp(spokenEmail, spokenPassword);
      handleAuthResult(res);
    } catch(e) {
      handleAuthResult({ success: false, error: e.message || 'Sign-up failed.' });
    }
  } else {
    handleAuthResult({ success: true, error: null });
  }
}

/* ════════════════════════════════════════
   HANDLE AUTH RESULT
════════════════════════════════════════ */
function handleAuthResult(result) {
  abortRecognition();
  cancelSpeech();

  const authSection  = document.getElementById('auth-section');
  const resultScreen = document.getElementById('result-screen');

  authSection.style.display = 'none';
  resultScreen.classList.add('show');

  if (result.success) {
    setBars('success');
    setPill('success', 'GRANTED');

    const isSignUp     = currentMode === 'signup';
    const titleText    = isSignUp ? 'Account Created' : 'Access Granted';
    const subtitleText = isSignUp ? 'Welcome to TalentBridge' : 'Identity verified — welcome back';

    resultScreen.innerHTML = `
      <div class="result-icon success" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="result-title success">${titleText}</div>
      <div class="result-sub">${subtitleText}</div>
      <div class="redirect-note">Redirecting to your interview…</div>
    `;

    const msg = isSignUp
      ? "Account created. Redirecting you to your interview."
      : "Access granted. Welcome back. Redirecting now.";
    announce(msg);
    localStorage.setItem('titanRole', 'candidate');

    speak(msg, () => {
      _redirecting = true;
      window.location.href = CANDIDATE_INTERVIEW_URL;
    });

  } else {
    setBars('error');
    setPill('error', 'DENIED');
    const reason = result.error || (currentMode === 'signup'
      ? 'Sign-up failed. Please try again.'
      : 'Credentials did not match.');

    resultScreen.innerHTML = `
      <div class="result-icon error" aria-hidden="true">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div class="result-title error">${currentMode === 'signup' ? 'Registration Failed' : 'Access Denied'}</div>
      <div class="result-sub">${reason}</div>
      <button class="retry-btn" onclick="resetFlow()" aria-label="Try again">Try Again</button>
    `;
    announce("Not granted. " + reason);
    speak("Not granted. " + reason + " Please try again.");
  }
}

/* ════════════════════════════════════════
   SHARED ERROR HANDLER
════════════════════════════════════════ */
function handleListenError(err) {
  state = 'idle';
  setBars('idle');
  setPill('error', 'MIC ERROR');
  setPrompt(err);
  announce(err);
  setTranscript('Tap the mic button or click above to continue.');
}

/* ════════════════════════════════════════
   MIC BUTTON
════════════════════════════════════════ */
function handleMicClick() {
  if (isListening) return;
  if (isSpeaking) { cancelSpeech(); }

  if (authStep === 'intent' || !currentMode) {
    listenForIntent();
    return;
  }

  if (currentMode === 'signin') {
    if      (authStep === 'email')    captureEmailSignIn();
    else if (authStep === 'password') capturePasswordSignIn();
  } else if (currentMode === 'signup') {
    if      (authStep === 'email')            captureEmailSignUp();
    else if (authStep === 'password')         capturePasswordSignUp();
    else if (authStep === 'password-confirm') captureConfirmSignUp();
  }
}

/* ════════════════════════════════════════
   FORCE MODE (chip click)
════════════════════════════════════════ */
function forceMode(mode) {
  abortRecognition();
  cancelSpeech();

  currentMode = mode;
  highlightChip(mode);
  applyModeHeader(mode);

  const resultScreen = document.getElementById('result-screen');
  const authSection  = document.getElementById('auth-section');
  resultScreen.classList.remove('show');
  resultScreen.innerHTML = '';
  authSection.style.display = '';

  if (mode === 'signin') startSignInFlow();
  else                   startSignUpFlow();
}

/* ════════════════════════════════════════
   RESET FLOW
════════════════════════════════════════ */
function resetFlow() {
  abortRecognition();
  cancelSpeech();
  state = 'idle';

  const authSection  = document.getElementById('auth-section');
  const resultScreen = document.getElementById('result-screen');
  resultScreen.classList.remove('show');
  resultScreen.innerHTML = '';
  authSection.style.display = '';

  setTranscript('');
  setConfidence(null);
  setBars('idle');
  setPill('', 'READY');
  updateSteps(0);
  highlightChip(null);
  document.getElementById('chip-signin').classList.remove('active');
  document.getElementById('chip-signup').classList.remove('signup-active');

  setTimeout(captureIntentMode, 300);
}

/* ════════════════════════════════════════
   KEYBOARD  (Space = mic)
════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    handleMicClick();
  }
});

/* ════════════════════════════════════════
   EXPOSE TO WINDOW
════════════════════════════════════════ */
window.handleMicClick = handleMicClick;
window.resetFlow      = resetFlow;
window.forceMode      = forceMode;

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
window.addEventListener('load', () => {
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => {};
  }
  setTimeout(captureIntentMode, 600);
});
</script>
