<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge | Intelligent Hiring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #050505;
            --text-white: #e0e0e0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Stars Background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
            z-index: 1;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .logo span { font-weight: 300; }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--gold);
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* Microphone Interface */
        .voice-interface {
            margin: 40px 0;
        }

        .mic-outer-circle {
            width: 160px;
            height: 160px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .mic-outer-circle.active {
            border-color: var(--gold);
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.3);
            animation: pulse 2s infinite;
        }

        .mic-inner-circle {
            width: 60px;
            height: 60px;
            background: var(--glass);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.5rem;
        }

        #status-text {
            margin-top: 20px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--gold);
        }

        /* Current Question Display */
        .current-question {
            margin: 30px auto;
            max-width: 700px;
            font-size: 1.25rem;
            line-height: 1.5;
            color: var(--gold);
            font-style: italic;
            min-height: 70px;
            padding: 20px;
            border-left: 5px solid var(--gold);
            background: var(--glass);
            border-radius: 8px;
            text-align: left;
        }

        /* Live Transcript Display */
        .transcript-container {
            height: 120px;
            margin: 20px 0;
            overflow-y: auto;
            font-style: italic;
            opacity: 0.75;
            font-size: 0.95rem;
            background: var(--glass);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        /* Buttons */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 2px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-outline:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    
    <div class="container">
        <header>
            <h1 class="logo">TALENT<span>BRIDGE</span></h1>
            <p class="tagline">INTELLIGENT HIRING. REIMAGINED.</p>
        </header>

        <div class="voice-interface">
            <div class="mic-outer-circle" id="mic-visualizer">
                <div class="mic-inner-circle">
                    <span id="mic-icon">🎤</span>
                </div>
            </div>
            <p id="status-text">MICROPHONE READY. SAY "START INTERVIEW" TO BEGIN</p>
        </div>

        <!-- Current Question Display -->
        <div id="current-question" class="current-question">
            Waiting for interview to start...
        </div>

        <div class="transcript-container" id="live-transcript">
        </div>

        <div class="controls">
            <button class="btn-outline" id="finish-btn" style="display:none; border-color: #fff; color: #fff;">Finish Interview Early</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // REPLACE WITH YOUR ACTUAL FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        // Voice Engine Setup
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const synthesis = window.speechSynthesis;
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-US";

        let fullTranscript = "";
        let interviewStarted = false;
        let currentQuestionIndex = -1;
        let silenceTimeout = null;
        const SILENCE_THRESHOLD = 4000; // 4 seconds of silence → go to next question

        const statusEl = document.getElementById('status-text');
        const micEl = document.getElementById('mic-visualizer');
        const transcriptEl = document.getElementById('live-transcript');
        const questionEl = document.getElementById('current-question');

        const questions = [
            "Please introduce yourself and your professional background.",
            "What are your key skills and technical expertise?",
            "Why do you want to join our company?",
            "Describe a significant challenge you faced at work and how you resolved it.",
            "Where do you see your career in the next five years?",
            "Do you have any questions for the interviewer?"
        ];

        // Reset silence timer every time candidate speaks
        function resetSilenceTimer() {
            if (silenceTimeout) clearTimeout(silenceTimeout);
            silenceTimeout = setTimeout(() => {
                if (interviewStarted) {
                    nextQuestion();
                }
            }, SILENCE_THRESHOLD);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 0.85;
            msg.rate = 0.95;
            synthesis.speak(msg);
        }

        function startInterview() {
            if (interviewStarted) return;
            interviewStarted = true;
            fullTranscript = "=== TALENTBRIDGE INTERVIEW STARTED ===\n\n";
            transcriptEl.innerText = fullTranscript;
            questionEl.innerText = "";
            
            micEl.classList.add('active');
            statusEl.innerText = "INTERVIEW_IN_PROGRESS";
            document.getElementById('finish-btn').style.display = 'inline-block';

            speak("Welcome to TalentBridge. We will now begin the voice interview.");
            
            // Slight delay then ask first question
            setTimeout(() => {
                currentQuestionIndex = -1;
                nextQuestion();
            }, 1800);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex >= questions.length) {
                finishInterview();
                return;
            }

            const q = questions[currentQuestionIndex];
            const displayText = `Question ${currentQuestionIndex + 1}: ${q}`;
            
            questionEl.innerText = displayText;
            fullTranscript += `\n\n${displayText}\nCandidate Answer: `;
            transcriptEl.innerText = fullTranscript;

            speak(q);
            statusEl.innerText = `ASKING_QUESTION_${currentQuestionIndex + 1}`;
            
            // Timer will start only when candidate begins speaking
        }

        async function finishInterview() {
            if (silenceTimeout) clearTimeout(silenceTimeout);
            recognition.stop();
            micEl.classList.remove('active');
            statusEl.innerText = "TRANSMITTING_DATA...";
            document.getElementById('finish-btn').style.display = 'none';

            const blob = new Blob([fullTranscript], { type: 'text/plain' });
            const fileName = `interview_${Date.now()}.txt`;

            try {
                // Upload to Firebase Storage
                const storageRef = ref(storage, `transcripts/${fileName}`);
                const snapshot = await uploadBytes(storageRef, blob);
                const fileUrl = await getDownloadURL(snapshot.ref);

                // Log to Firestore
                await addDoc(collection(db, "submissions"), {
                    transcriptUrl: fileUrl,
                    content: fullTranscript,
                    timestamp: serverTimestamp()
                });

                speak("Thank you. Your interview has been successfully recorded and sent to the recruiter.");
                statusEl.innerText = "INTERVIEW_COMPLETED";
                alert("Interview completed and sent successfully! Thank you.");
                
                // Reset for next candidate (demo mode)
                setTimeout(() => {
                    location.reload();
                }, 3000);
            } catch (err) {
                console.error(err);
                statusEl.innerText = "UPLOAD_ERROR";
            }
        }

        // ====================== SPEECH RECOGNITION LOGIC ======================
        recognition.onresult = (event) => {
            let interimTranscript = "";
            let finalAdded = false;

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    fullTranscript += event.results[i][0].transcript + " ";
                    finalAdded = true;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            transcriptEl.innerText = fullTranscript + interimTranscript;

            // WAKE WORD DETECTION (before interview starts)
            const allText = (fullTranscript + interimTranscript).toLowerCase();
            if (!interviewStarted && allText.includes("start interview")) {
                startInterview();
                return;
            }

            // During interview: reset silence timer on every speech
            if (interviewStarted) {
                resetSilenceTimer();
            }
        };

        recognition.onend = () => {
            // Keep listening forever (wake word + full interview)
            if (true) {
                setTimeout(() => {
                    recognition.start();
                }, 300);
            }
        };

        recognition.onerror = (event) => {
            console.error("Speech recognition error:", event.error);
        };

        // ====================== BUTTONS ======================
        document.getElementById('finish-btn').addEventListener('click', () => {
            finishInterview();
        });

        // ====================== AUTO START LISTENING ======================
        // Microphone starts automatically on page load (browser may require one click anywhere first time)
        window.addEventListener('load', () => {
            statusEl.innerText = "MICROPHONE READY. SAY \"START INTERVIEW\" TO BEGIN";
            try {
                recognition.start();
            } catch (e) {
                console.log("Voice activation ready – speak after granting mic permission.");
            }
        });
    </script>
</body>
</html>
