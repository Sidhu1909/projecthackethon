<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge | Voice Interview</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-dim: rgba(197,160,89,0.15);
            --gold-glow: rgba(197,160,89,0.3);
            --dark-bg: #050505;
            --surface: #0a0a0a;
            --text-white: #e0e0e0;
            --text-muted: #666;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(197,160,89,0.15);
            --error: #c97070;
            --success: #70c9a8;
            --info: #7090c9;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Starfield */
        .stars { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 30% 20%, #0d0c1a 0%, #050505 60%); }
        .stars canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

        /* Noise grain */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 998; opacity: 0.6;
        }

        .container {
            text-align: center;
            max-width: 760px;
            width: 92%;
            z-index: 1;
            padding: 40px 0;
        }

        /* Header */
        .header { margin-bottom: 28px; animation: fadeUp 0.8s ease both; }
        .logo { font-family: 'Cinzel', serif; font-size: clamp(1.4rem,3vw,2rem); letter-spacing: 10px; text-transform: uppercase; color: var(--text-white); }
        .logo em { color: var(--gold); font-style: normal; }
        .tagline { font-size: 0.6rem; letter-spacing: 5px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; }

        /* Candidate info strip */
        .cand-strip {
            display: none;
            margin-bottom: 16px;
            padding: 10px 18px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            animation: fadeUp 0.5s ease both;
        }
        .cand-strip span { color: var(--gold); }

        /* Mic */
        .voice-interface { margin: 20px 0; animation: fadeUp 0.8s 0.1s ease both; }
        .mic-outer-circle {
            width: 140px; height: 140px;
            border: 1px solid var(--border); border-radius: 50%;
            margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }
        .mic-outer-circle::before {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid transparent; transition: border-color 0.5s;
        }
        .mic-outer-circle.active {
            border-color: var(--gold);
            box-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(197,160,89,0.1);
        }
        .mic-outer-circle.active::before { border-color: rgba(197,160,89,0.2); }
        .mic-inner-circle {
            width: 58px; height: 58px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; transition: all 0.3s;
        }
        .mic-outer-circle.active .mic-inner-circle { background: var(--gold-dim); border-color: var(--gold); }
        .mic-outer-circle.loading-q .mic-inner-circle { background: rgba(112,144,201,0.15); border-color: var(--info); }

        @keyframes pulse { 0% { box-shadow: 0 0 40px var(--gold-glow); } 50% { box-shadow: 0 0 70px var(--gold-glow), 0 0 120px rgba(197,160,89,0.15); } 100% { box-shadow: 0 0 40px var(--gold-glow); } }
        .mic-outer-circle.active { animation: pulse 2.2s ease-in-out infinite; }

        .status-badge { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
        .status-badge.active .status-dot { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: blink 1.2s ease infinite; }
        .status-badge.loading .status-dot { background: var(--info); box-shadow: 0 0 6px var(--info); animation: blink 0.8s ease infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

        /* Question set fetch status */
        .fetch-banner {
            margin: 12px auto;
            padding: 12px 18px;
            background: rgba(112,144,201,0.08);
            border: 1px solid rgba(112,144,201,0.25);
            border-radius: 4px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--info);
            text-transform: uppercase;
            display: none;
            animation: fadeUp 0.4s ease both;
        }
        .fetch-banner.show { display: block; }
        .fetch-banner.ok   { color: var(--success); border-color: rgba(112,201,168,0.3); background: rgba(112,201,168,0.06); }
        .fetch-banner.err  { color: var(--error);   border-color: rgba(201,112,112,0.3); background: rgba(201,112,112,0.06); }

        /* Question card */
        .question-card {
            margin: 16px auto;
            padding: 20px 24px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold);
            background: var(--glass);
            border-radius: 4px;
            text-align: left;
            min-height: 76px;
            animation: fadeUp 0.8s 0.2s ease both;
        }
        .question-num  { font-size: 0.6rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; opacity: 0.8; }
        .question-text { font-size: 1.05rem; line-height: 1.55; color: var(--text-white); font-weight: 300; }
        .question-card.waiting .question-text { color: var(--text-muted); font-style: italic; }

        /* Progress */
        .progress-wrap { margin: 10px 0 16px; animation: fadeUp 0.8s 0.25s ease both; }
        .progress-bar-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-bar-fill  { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
        .progress-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-top: 6px; text-align: right; }

        /* Transcript */
        .transcript-box {
            max-height: 90px; overflow-y: auto;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; padding: 12px 16px;
            font-style: italic; font-size: 0.85rem; line-height: 1.6;
            color: rgba(224,224,224,0.6);
            text-align: left; margin-bottom: 16px;
            animation: fadeUp 0.8s 0.3s ease both;
        }
        .transcript-box:empty::before { content: 'Your answer will appear here…'; color: var(--text-muted); }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 16px; animation: fadeUp 0.8s 0.35s ease both; flex-wrap: wrap; }
        .btn { background: transparent; border: 1px solid; font-family: 'Inter', sans-serif; letter-spacing: 3px; font-size: 0.65rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase; padding: 12px 24px; }
        .btn-gold  { border-color: var(--gold);  color: var(--gold); }
        .btn-white { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }
        .btn-info  { border-color: rgba(112,144,201,0.5); color: var(--info); }
        .btn:hover { background: currentColor; color: var(--dark-bg); box-shadow: 0 0 20px var(--gold-glow); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* Auth guard */
        #auth-guard {
            position: fixed; inset: 0; z-index: 500;
            background: var(--dark-bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
            text-align: center;
        }
        #auth-guard .guard-title { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 8px; color: var(--gold); }
        #auth-guard p { font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
        #auth-guard a { display: inline-block; margin-top: 8px; border: 1px solid var(--gold); color: var(--gold); padding: 12px 28px; font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase; text-decoration: none; transition: all 0.3s; }
        #auth-guard a:hover { background: var(--gold); color: var(--dark-bg); }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #0c0c18; border: 1px solid var(--border);
            padding: 10px 20px; font-size: 0.7rem; letter-spacing: 2px;
            text-transform: uppercase; z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap; pointer-events: none;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(112,201,168,0.4); color: var(--success); }
        .toast.error   { border-color: rgba(201,112,112,0.4); color: var(--error); }
        .toast.info    { border-color: rgba(197,160,89,0.3);  color: var(--gold); }

        /* Completion */
        #completion-screen { display: none; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
        #completion-screen.show { display: flex; animation: fadeUp 0.6s ease both; }
        .completion-icon { width: 72px; height: 72px; border-radius: 50%; border: 1px solid var(--success); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(112,201,168,0.3); font-size: 1.6rem; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
        @keyframes pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .completion-title { font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 6px; color: var(--success); }
        .completion-sub   { font-size: 0.7rem; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .container { padding: 24px 0; } .question-text { font-size: 0.95rem; } }

        .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(197,160,89,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spinner 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Auth guard -->
<div id="auth-guard">
    <div class="guard-title">ACCESS REQUIRED</div>
    <p>Please sign in to begin your interview</p>
    <a href="./candidate-voice-auth.html">Go to Sign In →</a>
</div>

<!-- Stars -->
<div class="stars"><canvas id="starCanvas"></canvas></div>

<div class="container" id="main-content" style="display:none;">
    <header class="header">
        <h1 class="logo"><em>Talent</em>Bridge</h1>
        <p class="tagline">Voice Interview · Candidate Portal</p>
    </header>

    <!-- Candidate info strip -->
    <div class="cand-strip" id="candStrip">
        Signed in as: <span id="candEmail">—</span>
    </div>

    <!-- Question fetch banner -->
    <div class="fetch-banner" id="fetchBanner"></div>

    <!-- Main interview UI -->
    <div id="interview-ui">
        <div class="voice-interface">
            <div class="mic-outer-circle" id="mic-visualizer">
                <div class="mic-inner-circle"><span id="mic-icon">🎤</span></div>
            </div>
            <div class="status-badge" id="status-badge">
                <span class="status-dot"></span>
                <span id="status-text">LOADING…</span>
            </div>
        </div>

        <div class="progress-wrap" id="progress-wrap" style="display:none;">
            <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <div class="progress-label" id="progress-label">0 / ?</div>
        </div>

        <div class="question-card waiting" id="question-card">
            <div class="question-num" id="question-num"></div>
            <div class="question-text" id="current-question">
                <span class="spin"></span> Fetching your assigned questions…
            </div>
        </div>

        <div class="transcript-box" id="live-transcript"></div>

        <div class="controls">
            <button class="btn btn-gold"  id="start-btn"  onclick="startInterview()" disabled>Start Interview</button>
            <button class="btn btn-white" id="finish-btn" onclick="finishInterview()" style="display:none;">Finish Early</button>
            <button class="btn btn-info"  id="retry-btn"  onclick="fetchAssignedQuestions()" style="display:none;">↻ Retry Load</button>
        </div>
    </div>

    <!-- Completion -->
    <div id="completion-screen">
        <div class="completion-icon">✓</div>
        <div class="completion-title">INTERVIEW COMPLETE</div>
        <div class="completion-sub">Your responses have been recorded and sent to the recruiter</div>
        <button class="btn btn-white" style="margin-top:8px;" onclick="location.reload()">Start Another Session</button>
    </div>
</div>

<div class="toast" id="toast" role="alert"></div>

<script type="module">
    // ── Firebase ──────────────────────────────────────────────────────────────
    // SDK 11.6.0 — matches recruit.js and candlogin.js exactly.
    // All Storage + Firestore *writes* are delegated to recruit.js globals
    // (window.saveInterviewSubmission, window.getAssignedQuestionsForCandidate)
    // so there is no version mismatch and no duplicate app instances.
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import {
        getFirestore,
        getDoc, getDocs, doc, collection,
        query, where, orderBy,
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    // ── 🔧  Same config as recruit.js / candlogin.js ─────────────────────────
    const firebaseConfig = {
        apiKey:            "YOUR_API_KEY",
        authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
        projectId:         "YOUR_PROJECT_ID",
        storageBucket:     "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId:             "YOUR_APP_ID",
    };

    // Use a named instance so this module doesn't clash with recruit.js
    // (which uses the default app instance).
    let app, auth, db;
    let firebaseReady = false;

    try {
        app  = initializeApp(firebaseConfig, "candidate-voice");
        auth = getAuth(app);
        db   = getFirestore(app);
        firebaseReady = true;
    } catch(e) {
        console.warn("[candidate] Firebase init failed — demo mode.", e.message);
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let questions            = [];   // assigned by recruiter
    let perQuestionAnswers   = [];   // per-question string array
    let fullTranscript       = "";
    let interviewStarted     = false;
    let currentQuestionIndex = -1;
    let silenceTimeout       = null;
    let wakeRecognition      = null;
    let interviewRecognition = null;
    let assignedSetId        = null;
    let candidateId          = null;
    let candidateEmail       = "";

    const SILENCE_THRESHOLD = 6000; // 6s of silence → advance

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const statusBadge  = document.getElementById('status-badge');
    const statusText   = document.getElementById('status-text');
    const micViz       = document.getElementById('mic-visualizer');
    const transcriptEl = document.getElementById('live-transcript');
    const questionCard = document.getElementById('question-card');
    const questionNum  = document.getElementById('question-num');
    const questionEl   = document.getElementById('current-question');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLbl  = document.getElementById('progress-label');
    const startBtn     = document.getElementById('start-btn');
    const finishBtn    = document.getElementById('finish-btn');
    const retryBtn     = document.getElementById('retry-btn');
    const fetchBanner  = document.getElementById('fetchBanner');
    const candStrip    = document.getElementById('candStrip');
    const guard        = document.getElementById('auth-guard');
    const mainContent  = document.getElementById('main-content');

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, type='info') {
        const t = document.getElementById('toast');
        const icon = type==='success'?'✓':type==='error'?'✕':'—';
        t.className = `toast ${type}`;
        t.innerHTML = `${icon} ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    function setStatus(text, mode='idle') {
        statusText.textContent = text;
        statusBadge.classList.remove('active','loading');
        if (mode==='active')  statusBadge.classList.add('active');
        if (mode==='loading') statusBadge.classList.add('loading');
    }

    function showFetchBanner(msg, cls='') {
        fetchBanner.textContent = msg;
        fetchBanner.className = `fetch-banner show ${cls}`;
    }
    function hideFetchBanner() { fetchBanner.className='fetch-banner'; }

    // ── Auth guard ────────────────────────────────────────────────────────────
    function revealPage() {
        guard.style.display      = 'none';
        mainContent.style.display = '';
        candStrip.style.display  = 'block';
        document.getElementById('candEmail').textContent = candidateEmail || 'candidate';
        startStarfield();
        fetchAssignedQuestions();   // ← pull questions from Firebase
    }

    if (firebaseReady) {
        onAuthStateChanged(auth, user => {
            if (user) {
                candidateId    = user.uid;
                candidateEmail = user.email || '';
                localStorage.setItem('titanRole',  'candidate');
                localStorage.setItem('titanEmail', candidateEmail);
                localStorage.setItem('titanUID',   candidateId);
                revealPage();
            } else {
                candidateEmail = localStorage.getItem('titanEmail') || '';
                candidateId    = localStorage.getItem('titanUID')   || localStorage.getItem('titanEmail') || 'demo';
                if (localStorage.getItem('titanRole') === 'candidate') {
                    revealPage();
                } else {
                    guard.style.display = 'flex';
                }
            }
        });
    } else {
        candidateEmail = localStorage.getItem('titanEmail') || 'demo@talentbridge.ai';
        candidateId    = localStorage.getItem('titanUID')   || candidateEmail || 'demo';
        if (localStorage.getItem('titanRole') === 'candidate') {
            revealPage();
        } else {
            guard.style.display = 'flex';
        }
    }

    // ── Fetch assigned questions from Firebase ────────────────────────────────
    // Mirrors the logic in recruit.js getAssignedQuestionsForCandidate() but
    // runs client-side in the candidate's browser.
    // Collection path:  interviewSets/{setId}   (top-level mirror written by
    //                   recruit.js saveInterviewQuestions)
    // Candidate field:  assignedInterviewSets[] (set by candlogin.js + recruit.js)
    window.fetchAssignedQuestions = async function() {
        retryBtn.style.display = 'none';
        micViz.classList.add('loading-q');
        setStatus('FETCHING QUESTIONS…', 'loading');
        showFetchBanner('⏳ Contacting Firebase for your assigned question set…');
        questionCard.classList.add('waiting');
        questionEl.innerHTML = '<span class="spin"></span> Fetching your assigned questions…';

        if (!firebaseReady || !db) {
            useDemoQuestions();
            return;
        }

        try {
            let found = null;

            // 1. Check candidate doc for assignedInterviewSets (candlogin.js field name)
            const candDoc = await getDoc(doc(db, "candidates", candidateId));
            if (candDoc.exists()) {
                const assignedSets = candDoc.data().assignedInterviewSets || [];
                if (assignedSets.length > 0) {
                    const latestSetId = assignedSets[assignedSets.length - 1];
                    // Read from top-level interviewSets mirror (not interview_sets)
                    const setSnap = await getDoc(doc(db, "interviewSets", latestSetId));
                    if (setSnap.exists() && setSnap.data().questions?.length) {
                        found = { questions: setSnap.data().questions, setId: latestSetId };
                    }
                }
            }

            // 2. Fallback: query interviewSets mirror by candidateId
            if (!found) {
                const snap = await getDocs(
                    query(
                        collection(db, "interviewSets"),
                        where("candidateId", "==", candidateId),
                        orderBy("createdAt", "desc")
                    )
                );
                if (!snap.empty) {
                    const latest = snap.docs[0];
                    if (latest.data().questions?.length) {
                        found = { questions: latest.data().questions, setId: latest.id };
                    }
                }
            }

            micViz.classList.remove('loading-q');

            if (found) {
                questions          = found.questions;
                assignedSetId      = found.setId;
                perQuestionAnswers = new Array(questions.length).fill('');

                showFetchBanner(`✓ ${questions.length} questions assigned by your recruiter`, 'ok');
                setTimeout(hideFetchBanner, 4000);
                setStatus('READY — SAY "START INTERVIEW"', 'idle');
                questionEl.textContent = 'Say "Start Interview" or press the button to begin.';
                questionCard.classList.add('waiting');
                startBtn.disabled = false;
                startWakeWordListening();
            } else {
                showFetchBanner('⚠️ No question set assigned yet. Please wait for your recruiter.', 'err');
                setStatus('AWAITING QUESTIONS', 'idle');
                questionEl.textContent = 'Your recruiter has not assigned questions yet. Check back shortly.';
                retryBtn.style.display = 'inline-block';
            }
        } catch(err) {
            console.error("[candidate] fetchAssignedQuestions error:", err);
            micViz.classList.remove('loading-q');
            showFetchBanner('⚠️ Could not load questions — using defaults.', 'err');
            useDemoQuestions();
        }
    };

    function useDemoQuestions() {
        questions = [
            "Please introduce yourself and walk us through your professional background.",
            "What are your key technical skills and areas of expertise?",
            "Why do you want to join our company, and what excites you about this role?",
            "Describe a significant challenge you faced at work and how you resolved it.",
            "Where do you see your career heading over the next five years?",
            "Do you have any questions for the interviewer?"
        ];
        perQuestionAnswers = new Array(questions.length).fill('');
        assignedSetId = null;
        micViz.classList.remove('loading-q');
        showFetchBanner('ℹ️ Using default questions (demo mode)', '');
        setTimeout(hideFetchBanner, 4000);
        setStatus('READY — SAY "START INTERVIEW"', 'idle');
        questionEl.textContent = 'Say "Start Interview" or press the button to begin.';
        questionCard.classList.add('waiting');
        startBtn.disabled = false;
        startWakeWordListening();
    }

    // ── Starfield ─────────────────────────────────────────────────────────────
    function startStarfield() {
        const canvas = document.getElementById('starCanvas');
        const ctx    = canvas.getContext('2d');
        let stars    = [];
        function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
        function initStars() {
            stars = [];
            const n = Math.floor((canvas.width*canvas.height)/5000);
            for (let i=0;i<n;i++) stars.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*0.8+0.1, o:Math.random()*0.6+0.1, s:Math.random()*0.008+0.002, p:Math.random()*Math.PI*2 });
        }
        let f=0;
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); f++;
            for (const s of stars) {
                const op=s.o*(0.4+0.6*Math.sin(f*s.s+s.p));
                ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
                ctx.fillStyle=`rgba(197,160,89,${op})`; ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize',()=>{resize();initStars();});
        resize(); initStars(); draw();
    }

    // ── Progress ──────────────────────────────────────────────────────────────
    function updateProgress() {
        const done = Math.max(0, currentQuestionIndex);
        const total = questions.length || 1;
        const pct  = (done/total)*100;
        progressFill.style.width = pct+'%';
        progressLbl.textContent  = `${done} / ${total}`;
    }

    // ── TTS speak ─────────────────────────────────────────────────────────────
    function speak(text, onEnd) {
        if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
        const utt   = new SpeechSynthesisUtterance(text);
        utt.rate    = 0.9; utt.pitch = 0.85; utt.volume = 1;
        const voices = speechSynthesis.getVoices();
        const v = voices.find(v=>/Samantha|Karen|Daniel|Google UK|Google US/i.test(v.name))
               || voices.find(v=>v.lang.startsWith('en'));
        if (v) utt.voice = v;
        const timer = setTimeout(()=>{ if (onEnd) onEnd(); }, 15000);
        utt.onend   = ()=>{ clearTimeout(timer); if (onEnd) onEnd(); };
        utt.onerror = ()=>{ clearTimeout(timer); if (onEnd) onEnd(); };
        speechSynthesis.cancel();
        speechSynthesis.speak(utt);
    }

    function resetSilenceTimer() {
        if (silenceTimeout) clearTimeout(silenceTimeout);
        silenceTimeout = setTimeout(()=>{ if (interviewStarted) nextQuestion(); }, SILENCE_THRESHOLD);
    }

    // ── Wake-word ─────────────────────────────────────────────────────────────
    function startWakeWordListening() {
        if (!SR) { setStatus('BROWSER UNSUPPORTED'); return; }
        setStatus('SAY "START INTERVIEW"', 'idle');
        function startWake() {
            wakeRecognition = new SR();
            wakeRecognition.lang='en-US'; wakeRecognition.continuous=false; wakeRecognition.interimResults=true;
            wakeRecognition.onresult = e => {
                let txt='';
                for(let i=e.resultIndex;i<e.results.length;i++) txt+=e.results[i][0].transcript;
                if (txt.toLowerCase().includes('start interview')) { wakeRecognition.abort(); window.startInterview(); }
            };
            wakeRecognition.onend   = ()=>{ if (!interviewStarted) setTimeout(startWake,200); };
            wakeRecognition.onerror = ()=>{ if (!interviewStarted) setTimeout(startWake,300); };
            try { wakeRecognition.start(); } catch(e) {}
        }
        startWake();
    }

    // ── Start interview ───────────────────────────────────────────────────────
    window.startInterview = function() {
        if (interviewStarted || questions.length===0) return;
        interviewStarted = true;
        if (wakeRecognition) { try { wakeRecognition.abort(); } catch(e){} }

        const date = new Date().toISOString();
        fullTranscript = `=== TALENTBRIDGE VOICE INTERVIEW ===\nCandidate: ${candidateEmail}\nDate: ${date}\nSet ID: ${assignedSetId||'N/A'}\n\n`;

        micViz.classList.add('active');
        setStatus('INTERVIEW IN PROGRESS', 'active');
        startBtn.style.display  = 'none';
        finishBtn.style.display = 'inline-block';
        retryBtn.style.display  = 'none';
        progressWrap.style.display = '';
        questionCard.classList.remove('waiting');
        hideFetchBanner();

        speak(`Welcome to TalentBridge. Your recruiter has assigned ${questions.length} questions for today's interview. Please answer each question clearly. I will move to the next question after a brief pause. Let's begin.`, ()=>{
            currentQuestionIndex = -1;
            nextQuestion();
        });
    };

    // ── Next question ─────────────────────────────────────────────────────────
    function nextQuestion() {
        currentQuestionIndex++;
        updateProgress();
        if (currentQuestionIndex >= questions.length) { finishInterview(); return; }

        // Snapshot the answer collected so far for the previous question
        if (currentQuestionIndex > 0 && perQuestionAnswers) {
            // already saved in onresult
        }

        if (interviewRecognition) { try { interviewRecognition.stop(); } catch(e){} }

        const q = questions[currentQuestionIndex];
        questionNum.textContent = `Question ${currentQuestionIndex+1} of ${questions.length}`;
        questionEl.textContent  = q;
        fullTranscript += `\nQuestion ${currentQuestionIndex+1}: ${q}\nAnswer: `;
        perQuestionAnswers[currentQuestionIndex] = '';   // reset slot for this Q

        speak(q, ()=>{ startAnswerListening(); });
    }

    // ── Answer listening ──────────────────────────────────────────────────────
    function startAnswerListening() {
        if (!SR) return;
        setStatus(`LISTENING — Q${currentQuestionIndex+1}`, 'active');
        const qIdx = currentQuestionIndex;   // capture

        function startRec() {
            interviewRecognition = new SR();
            interviewRecognition.lang='en-US'; interviewRecognition.continuous=true; interviewRecognition.interimResults=true;

            interviewRecognition.onresult = e => {
                let interim='', final='';
                for(let i=e.resultIndex;i<e.results.length;i++) {
                    if (e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
                    else interim+=e.results[i][0].transcript;
                }
                if (final) {
                    fullTranscript+=final;
                    perQuestionAnswers[qIdx] = (perQuestionAnswers[qIdx]||'') + final;
                }
                transcriptEl.textContent = ((perQuestionAnswers[qIdx]||'')+interim).trim();
                transcriptEl.scrollTop   = transcriptEl.scrollHeight;
                resetSilenceTimer();
            };

            interviewRecognition.onend = ()=>{
                if (interviewStarted && currentQuestionIndex<questions.length) setTimeout(startRec,150);
            };
            interviewRecognition.onerror = e=>{
                if (e.error!=='aborted' && interviewStarted) setTimeout(startRec,250);
            };
            try { interviewRecognition.start(); } catch(e){}
        }

        startRec();
        resetSilenceTimer();
    }

    // ── Finish & submit ───────────────────────────────────────────────────────
    // All Firestore writes are delegated to window.saveInterviewSubmission
    // (exported by recruit.js), which uses the canonical candlogin.js field names:
    //   interviewAnswers, interviewStatus:'submitted', answersSubmittedAt
    window.finishInterview = async function() {
        if (!interviewStarted) return;
        interviewStarted = false;

        if (silenceTimeout)       clearTimeout(silenceTimeout);
        if (interviewRecognition) { try { interviewRecognition.stop(); } catch(e){} }
        if (wakeRecognition)      { try { wakeRecognition.abort(); }    catch(e){} }

        micViz.classList.remove('active');
        setStatus('SAVING…', 'loading');
        finishBtn.style.display = 'none';

        fullTranscript += `\n\n=== END OF INTERVIEW ===\nCompleted: ${new Date().toISOString()}`;

        // Clean per-question answers
        const cleanAnswers = perQuestionAnswers.map(a => (a||'').trim());

        // Wait for recruit.js module to finish loading its globals (race guard)
        let attempts = 0;
        while (!window.saveInterviewSubmission && attempts < 20) {
            await new Promise(r => setTimeout(r, 200));
            attempts++;
        }

        if (window.saveInterviewSubmission) {
            try {
                setStatus('UPLOADING…', 'loading');
                showToast('Saving your interview…', 'info');

                // Delegate all Firestore + Storage writes to recruit.js
                await window.saveInterviewSubmission({
                    candidateId,
                    candidateEmail,
                    answers:       cleanAnswers,   // → interviewAnswers in Firestore
                    questions,
                    fullTranscript,
                    setId:         assignedSetId || null,
                });

                showToast('Interview saved & sent to recruiter!', 'success');
                speak("Thank you. Your interview has been successfully recorded and sent to your recruiter.", showCompletion);

            } catch(err) {
                console.error("[candidate] saveInterviewSubmission error:", err);
                showToast('Upload failed — saving locally.', 'error');
                downloadLocally();
                speak("Thank you. Your interview has been completed.", showCompletion);
            }
        } else {
            // Demo fallback — recruit.js not loaded
            showToast('Demo mode — downloading transcript.', 'info');
            downloadLocally();
            speak("Thank you. Your interview has been completed.", showCompletion);
        }
    };

    function downloadLocally() {
        const blob = new Blob([fullTranscript], { type:'text/plain' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href=url; a.download=`interview_${Date.now()}.txt`;
        a.click(); URL.revokeObjectURL(url);
    }

    function showCompletion() {
        document.getElementById('interview-ui').style.display = 'none';
        document.getElementById('completion-screen').classList.add('show');
        setStatus('COMPLETED', 'idle');
        progressFill.style.width = '100%';
        progressLbl.textContent  = `${questions.length} / ${questions.length}`;
    }

    // Space-bar to start
    document.addEventListener('keydown', e=>{
        if (e.code==='Space' && !interviewStarted && e.target===document.body) {
            e.preventDefault(); window.startInterview();
        }
    });
</script>
<!-- ── recruit.js: provides window.saveInterviewSubmission and other globals ── -->
<script type="module" src="./recruit.js"></script>
