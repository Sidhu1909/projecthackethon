<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Authentication — TalentBridge</title>
  <!-- ARIA live regions announced immediately for screen readers -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070810;
      --surface:   #0e1020;
      --border:    rgba(120,180,255,0.12);
      --blue:      #5b9cf6;
      --blue-glow: rgba(91,156,246,0.3);
      --cyan:      #38d9f5;
      --green:     #3ddc97;
      --green-glow:rgba(61,220,151,0.3);
      --red:       #f25c5c;
      --red-glow:  rgba(242,92,92,0.3);
      --amber:     #f0b429;
      --white:     #e8edf7;
      --muted:     #6b7a99;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-serif:'DM Serif Display', serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Accessibility: visible focus ring ── */
    :focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 4px;
    }

    /* ── ARIA live region (off-screen but readable by screen readers) ── */
    #aria-live {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,156,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,156,246,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Radial glow behind card ── */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,156,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    #app {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 2.8rem 2.8rem;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 24px 80px rgba(0,0,0,0.6);
    }

    /* Corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--blue);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.2s;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border: 1px solid var(--border);
      border-radius: 50%;
      margin-bottom: 1.2rem;
      position: relative;
    }
    .logo-mark svg { width: 24px; height: 24px; stroke: var(--blue); fill: none; stroke-width: 1.5; }
    .logo-mark::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(91,156,246,0.15);
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 1.9rem;
      font-weight: 400;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Steps indicator ── */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.5s;
    }

    .step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      transition: all 0.4s ease;
      flex-shrink: 0;
    }
    .step-dot.active {
      border-color: var(--blue);
      color: var(--blue);
      box-shadow: 0 0 12px var(--blue-glow);
    }
    .step-dot.done {
      border-color: var(--green);
      background: rgba(61,220,151,0.1);
      color: var(--green);
    }

    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      max-width: 80px;
      transition: background 0.4s;
    }
    .step-line.done { background: var(--green); }

    .step-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      min-height: 1em;
      transition: color 0.3s;
    }

    /* ── Waveform visualizer ── */
    .viz-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      gap: 3px;
      margin-bottom: 1.8rem;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--blue);
      opacity: 0.25;
      height: 8px;
      transition: background 0.3s;
    }

    .bar.active {
      opacity: 1;
      animation: wave var(--dur, 0.8s) ease-in-out infinite alternate;
      animation-delay: var(--del, 0s);
    }

    .bar.success { background: var(--green); }
    .bar.error   { background: var(--red); }

    @keyframes wave {
      from { height: 6px; }
      to   { height: var(--h, 40px); }
    }

    /* ── Status / prompt text ── */
    .prompt-box {
      text-align: center;
      margin-bottom: 1.5rem;
      min-height: 4.5rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem;
    }

    .prompt-text {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-style: italic;
      color: var(--white);
      line-height: 1.4;
      transition: opacity 0.3s;
    }

    .transcript-text {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--cyan);
      min-height: 1.2em;
      transition: opacity 0.3s;
      font-style: normal;
    }

    /* ── State pill ── */
    .state-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.35rem 0.9rem;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      transition: all 0.3s;
    }
    .state-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .state-pill.listening {
      border-color: rgba(91,156,246,0.4);
      color: var(--blue);
    }
    .state-pill.listening .dot {
      background: var(--blue);
      box-shadow: 0 0 6px var(--blue);
      animation: blink 1s ease infinite;
    }
    .state-pill.speaking {
      border-color: rgba(240,180,41,0.4);
      color: var(--amber);
    }
    .state-pill.speaking .dot {
      background: var(--amber);
      box-shadow: 0 0 6px rgba(240,180,41,0.5);
      animation: blink 0.6s ease infinite;
    }
    .state-pill.success {
      border-color: rgba(61,220,151,0.4);
      color: var(--green);
    }
    .state-pill.success .dot { background: var(--green); }
    .state-pill.error {
      border-color: rgba(242,92,92,0.4);
      color: var(--red);
    }
    .state-pill.error .dot { background: var(--red); }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Mic button ── */
    .mic-btn {
      display: block;
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      margin: 0 auto 1.5rem;
      position: relative;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn svg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      transition: stroke 0.3s;
    }
    .mic-btn:hover, .mic-btn:focus-visible {
      border-color: var(--blue);
      box-shadow: 0 0 20px var(--blue-glow);
    }
    .mic-btn:hover svg, .mic-btn:focus-visible svg { stroke: var(--blue); }
    .mic-btn.listening {
      border-color: var(--blue);
      box-shadow: 0 0 30px var(--blue-glow), 0 0 60px rgba(91,156,246,0.1);
      animation: breathe 1.4s ease-in-out infinite;
    }
    .mic-btn.listening svg { stroke: var(--blue); }
    .mic-btn.disabled { opacity: 0.3; pointer-events: none; cursor: default; }

    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* ── Hint text ── */
    .hint {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Result overlay ── */
    #result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.2rem;
      min-height: 280px;
    }
    #result-screen.show { display: flex; animation: fadeIn 0.7s ease forwards; }

    .result-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1px solid;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.5rem;
    }
    .result-icon.success {
      border-color: var(--green);
      box-shadow: 0 0 30px var(--green-glow);
      animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .result-icon.error {
      border-color: var(--red);
      box-shadow: 0 0 30px var(--red-glow);
      animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .result-icon svg { width: 32px; height: 32px; stroke-width: 2; stroke-linecap: round; }
    .result-icon.success svg { stroke: var(--green); fill: none; }
    .result-icon.error  svg { stroke: var(--red);   fill: none; }

    @keyframes resultPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-title {
      font-family: var(--font-serif);
      font-size: 2rem;
    }
    .result-title.success { color: var(--green); }
    .result-title.error   { color: var(--red); }

    .result-sub {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .retry-btn {
      margin-top: 0.8rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .retry-btn:hover, .retry-btn:focus-visible {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── Demo credentials note ── */
    .demo-note {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.2rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-align: center;
      line-height: 1.9;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1s;
    }
    .demo-note strong { color: var(--blue); }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Keyboard shortcut badge ── */
    .kbd {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-size: 0.55rem;
      color: var(--muted);
      vertical-align: middle;
    }
  </style>
</head>
<body>

<!-- Screen-reader live region -->
<div id="aria-live" aria-live="assertive" aria-atomic="true" role="status"></div>

<div id="app">
  <div class="card" role="main" aria-label="Voice Authentication">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><path d="M3 11a9 9 0 0 0 18 0"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <h1 class="card-title">Voice Sign In</h1>
      <p class="card-subtitle">Speak to authenticate</p>
    </div>

    <!-- Steps -->
    <div class="steps" aria-label="Authentication progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="2" id="steps-bar">
      <div class="step-dot active" id="step1" aria-label="Step 1: Email">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="step2" aria-label="Step 2: Password">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="step3" aria-label="Step 3: Result">✓</div>
    </div>

    <!-- Auth form section -->
    <div id="auth-section">
      <div class="step-label" id="step-label">STEP 1 OF 2 — EMAIL</div>

      <!-- Waveform -->
      <div class="viz-wrap" aria-hidden="true" id="viz"></div>

      <!-- Prompt -->
      <div class="prompt-box">
        <div class="prompt-text" id="prompt-text">Initialising…</div>
        <div class="transcript-text" id="transcript-text"></div>
      </div>

      <!-- State pill -->
      <div style="text-align:center; margin-bottom: 1.5rem;">
        <div class="state-pill" id="state-pill">
          <span class="dot"></span>
          <span id="state-label">READY</span>
        </div>
      </div>

      <!-- Mic button -->
      <button
        class="mic-btn disabled"
        id="mic-btn"
        aria-label="Tap to speak"
        onclick="handleMicClick()"
        tabindex="0"
      >
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
      </button>

      <p class="hint">Press <span class="kbd">Space</span> or tap the mic to speak</p>
    </div>

    <!-- Result screen -->
    <div id="result-screen" role="alert" aria-live="assertive"></div>

    <!-- Demo credentials -->
    <div class="demo-note" aria-label="Demo credentials for testing">
      Demo credentials — say: <strong>email</strong> "john at example dot com" &nbsp;·&nbsp; <strong>password</strong> "open sesame"
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const CREDENTIALS = {
  email: 'john at example dot com',   // spoken form
  password: 'open sesame'
};

// Normalise spoken text for comparison
function normalize(str) {
  return str.toLowerCase()
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let state = 'idle';   // idle | speaking | waiting | listening | done
let authStep = 'email'; // email | password
let spokenEmail = '';
let spokenPassword = '';
let recognition = null;
let isSpeaking = false;

/* ════════════════════════════════════════
   WAVEFORM
════════════════════════════════════════ */
const viz = document.getElementById('viz');
const BAR_COUNT = 28;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const maxH = 12 + Math.sin(i / BAR_COUNT * Math.PI) * 32;
  b.style.setProperty('--h', maxH + 'px');
  b.style.setProperty('--dur', (0.5 + Math.random() * 0.7).toFixed(2) + 's');
  b.style.setProperty('--del', (i / BAR_COUNT * 0.5).toFixed(2) + 's');
  viz.appendChild(b);
}

function setBars(mode) {
  // mode: idle | listening | speaking | success | error
  viz.querySelectorAll('.bar').forEach(b => {
    b.className = 'bar';
    if (mode === 'listening') { b.classList.add('active'); }
    else if (mode === 'speaking') { b.classList.add('active'); }
    else if (mode === 'success') { b.classList.add('active', 'success'); }
    else if (mode === 'error')   { b.classList.add('active', 'error'); }
  });
}

/* ════════════════════════════════════════
   ARIA LIVE
════════════════════════════════════════ */
function announce(msg) {
  const el = document.getElementById('aria-live');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = msg; });
}

/* ════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════ */
function setPrompt(text) {
  document.getElementById('prompt-text').textContent = text;
}

function setTranscript(text) {
  const el = document.getElementById('transcript-text');
  el.textContent = text;
}

function setPill(mode, label) {
  const pill = document.getElementById('state-pill');
  const lbl  = document.getElementById('state-label');
  pill.className = 'state-pill ' + mode;
  lbl.textContent = label;
}

function setMicState(active) {
  const btn = document.getElementById('mic-btn');
  btn.className = 'mic-btn' + (active ? ' listening' : '');
  btn.setAttribute('aria-label', active ? 'Listening… speak now' : 'Tap to speak');
}

function enableMic(on) {
  const btn = document.getElementById('mic-btn');
  if (on) btn.classList.remove('disabled');
  else    btn.classList.add('disabled');
}

function updateSteps(step) {
  // step: 1, 2, 3
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  const s3 = document.getElementById('step3');
  const l1 = document.getElementById('line1');
  const l2 = document.getElementById('line2');
  const lbl= document.getElementById('step-label');

  s1.className = 'step-dot' + (step > 1 ? ' done' : step === 1 ? ' active' : '');
  s2.className = 'step-dot' + (step > 2 ? ' done' : step === 2 ? ' active' : '');
  s3.className = 'step-dot' + (step === 3 ? ' active' : '');
  l1.className = 'step-line' + (step > 1 ? ' done' : '');
  l2.className = 'step-line' + (step > 2 ? ' done' : '');

  if (step === 1) lbl.textContent = 'STEP 1 OF 2 — EMAIL';
  if (step === 2) lbl.textContent = 'STEP 2 OF 2 — PASSWORD';
  if (step === 3) lbl.textContent = 'VERIFYING…';
}

/* ════════════════════════════════════════
   SPEECH SYNTHESIS
════════════════════════════════════════ */
function speak(text, onEnd) {
  if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  isSpeaking = true;
  setPill('speaking', 'SPEAKING');
  setBars('speaking');

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.92;
  utt.pitch = 1.0;
  utt.volume = 1;

  // Pick a clear, natural voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    /Samantha|Karen|Daniel|Google UK|Google US|Alex/i.test(v.name)
  ) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;

  utt.onend = () => {
    isSpeaking = false;
    if (onEnd) onEnd();
  };
  utt.onerror = () => { isSpeaking = false; if (onEnd) onEnd(); };

  announce(text); // also announce to screen readers
  speechSynthesis.speak(utt);
}

/* ════════════════════════════════════════
   SPEECH RECOGNITION
════════════════════════════════════════ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function listen(onResult, onError) {
  if (!SR) { onError('Speech recognition not supported'); return; }
  if (recognition) { try { recognition.abort(); } catch(e) {} }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  setPill('listening', 'LISTENING');
  setMicState(true);
  setBars('listening');

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    setTranscript('"' + (final || interim) + '"');
    if (final) {
      recognition.stop();
      onResult(final.trim());
    }
  };

  recognition.onerror = (e) => {
    setMicState(false);
    if (e.error === 'no-speech') onError('No speech detected. Please try again.');
    else if (e.error === 'not-allowed') onError('Microphone access denied. Please allow mic access.');
    else onError('Error: ' + e.error);
  };

  recognition.onend = () => { setMicState(false); };
  recognition.start();
}

/* ════════════════════════════════════════
   AUTH FLOW
════════════════════════════════════════ */
function startFlow() {
  authStep = 'email';
  spokenEmail = '';
  spokenPassword = '';
  updateSteps(1);
  setTranscript('');
  enableMic(false);
  setPill('speaking', 'SPEAKING');

  speak("Welcome. This is the voice authentication system for TalentBridge. Please say your email address after the tone.", () => {
    setPrompt("Please say your email address.");
    announce("Please say your email address. Tap the microphone or press Space to begin.");
    setPill('', 'READY');
    setBars('idle');
    enableMic(true);
  });

  setPrompt("Welcome to TalentBridge voice sign-in.");
}

function handleMicClick() {
  if (state === 'listening') return;
  if (authStep === 'email') captureEmail();
  else if (authStep === 'password') capturePassword();
}

function captureEmail() {
  state = 'listening';
  enableMic(false);
  setPrompt("Listening for your email…");
  announce("Listening. Please say your email address now.");

  listen((result) => {
    state = 'processing';
    spokenEmail = normalize(result);
    setTranscript('"' + result + '"');
    setBars('idle');
    setPill('', 'RECEIVED');

    // Confirm and move to password
    speak('Got it. Now please say your password.', () => {
      authStep = 'password';
      updateSteps(2);
      setPrompt("Please say your password.");
      announce("Please say your password. Tap the microphone or press Space.");
      setTranscript('');
      setPill('', 'READY');
      enableMic(true);
      state = 'waiting';
    });

  }, (err) => {
    state = 'idle';
    setBars('idle');
    setPill('error', 'ERROR');
    setPrompt(err);
    announce(err + " Please try again.");
    setTimeout(() => {
      setPrompt("Please say your email address.");
      setPill('', 'READY');
      enableMic(true);
    }, 2800);
  });
}

function capturePassword() {
  state = 'listening';
  enableMic(false);
  setPrompt("Listening for your password…");
  announce("Listening. Please say your password now.");

  listen((result) => {
    state = 'verifying';
    spokenPassword = normalize(result);
    setTranscript('"' + result + '"');
    setBars('idle');
    setPill('', 'VERIFYING');
    updateSteps(3);

    setTimeout(() => verifyCredentials(), 600);

  }, (err) => {
    state = 'idle';
    setBars('idle');
    setPill('error', 'ERROR');
    setPrompt(err);
    announce(err + " Please try again.");
    setTimeout(() => {
      setPrompt("Please say your password.");
      setPill('', 'READY');
      enableMic(true);
    }, 2800);
  });
}

function verifyCredentials() {
  // use firebase instead of dummy credentials
  if (window.attemptFirebaseSignIn) {
    window.attemptFirebaseSignIn(spokenEmail, spokenPassword).then(result => {
      handleFirebaseResult(result);
    }).catch(err => {
      console.error('firebase attempt failed:', err);
      handleFirebaseResult({ success: false, error: 'Sign-in error' });
    });
  } else {
    // fallback to demo mode if firebase not loaded
    const emailOk    = spokenEmail    === normalize(CREDENTIALS.email);
    const passwordOk = spokenPassword === normalize(CREDENTIALS.password);
    const granted    = emailOk && passwordOk;
    handleFirebaseResult({ success: granted, error: granted ? null : 'Credentials do not match' });
  }
}

function handleFirebaseResult(result) {
  const authSection  = document.getElementById('auth-section');
  const resultScreen = document.getElementById('result-screen');

  authSection.style.display = 'none';
  resultScreen.classList.add('show');

  if (result.success) {
    setBars('success');
    setPill('success', 'GRANTED');
    resultScreen.innerHTML = `
      <div class="result-icon success" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="result-title success">Access Granted</div>
      <div class="result-sub">Identity verified — welcome back</div>
      <button class="retry-btn" onclick="resetFlow()" aria-label="Sign out and return to login">Sign Out</button>
    `;
    announce("Access granted. Identity verified. Welcome back.");
    speak("Access granted. Welcome back. You are now signed in.");
  } else {
    setBars('error');
    setPill('error', 'DENIED');

    const reason = result.error || 'credentials did not match';
    resultScreen.innerHTML = `
      <div class="result-icon error" aria-hidden="true">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <div class="result-title error">Access Denied</div>
      <div class="result-sub">${reason}</div>
      <button class="retry-btn" onclick="resetFlow()" aria-label="Try again">Try Again</button>
    `;
    announce("Access not granted. " + reason + ". Please try again.");
    speak("Access not granted. " + reason + ". Please try again.");
  }
}

function resetFlow() {
  speechSynthesis && speechSynthesis.cancel();
  state = 'idle';

  const authSection  = document.getElementById('auth-section');
  const resultScreen = document.getElementById('result-screen');

  resultScreen.classList.remove('show');
  resultScreen.innerHTML = '';
  authSection.style.display = '';

  setTranscript('');
  setBars('idle');
  setPill('', 'READY');
  updateSteps(1);
  enableMic(false);

  setTimeout(startFlow, 300);
}

/* ════════════════════════════════════════
   KEYBOARD SHORTCUT (Space = mic)
════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    handleMicClick();
  }
});

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
// Voices load async
function boot() {
  if (speechSynthesis && speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = startFlow;
  } else {
    setTimeout(startFlow, 1000);
  }
}

window.addEventListener('load', boot);
</script>
</body>
</html>
